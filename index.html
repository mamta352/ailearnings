  <link rel="preconnect" href="https://fonts.bunny.net" crossorigin>
  <link href="https://fonts.bunny.net/css?family=mona-sans:400,600,700,800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">

  <style>
    body { margin: 0; background: #030712; font-family: 'Inter', sans-serif; }

    /* Mona Sans for headings */
    h1, h2, h3, .font-display { font-family: 'Mona Sans', 'Inter', sans-serif; }

    /* Starfield */
    .starfield {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .starfield svg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100vw;
      height: 100vh;
      opacity: 1;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.15; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.2); }
    }
    @keyframes twinkle-dim {
      0%, 100% { opacity: 0.05; }
      50% { opacity: 0.15; }
    }
    .star { animation: twinkle 4s ease-in-out infinite; opacity: 0.15; }
    .star-dim { animation: twinkle-dim 5s ease-in-out infinite; opacity: 0.05; }

    /* Blue glow */
    .glow {
      position: fixed;
      top: -20%;
      right: -10%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(56,189,248,0.12) 0%, rgba(0,71,255,0.06) 40%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      border-radius: 50%;
    }

    /* Ensure content sits above background */
    #root { position: relative; z-index: 1; }
    /* Markdown prose styles for PrepPlan */
    .md-content { color: #d1d5db; }
    .md-content h1 { color: #f9fafb; font-size: 1.875rem; font-weight: 700; margin: 1.5rem 0 1rem; }
    .md-content h2 { color: #f3f4f6; font-size: 1.375rem; font-weight: 600; margin: 1.75rem 0 0.75rem; border-bottom: 1px solid #374151; padding-bottom: 0.4rem; }
    .md-content h3 { color: #e5e7eb; font-size: 1.05rem; font-weight: 600; margin: 1rem 0 0.4rem; }
    .md-content p { margin: 0.6rem 0; line-height: 1.75; }
    .md-content ul { list-style: disc; padding-left: 1.75rem; margin: 0.5rem 0; }
    .md-content li { margin: 0.35rem 0; line-height: 1.6; }
    .md-content a { color: #60a5fa; text-decoration: underline; }
    .md-content a:hover { color: #93c5fd; }
    .md-content strong { color: #f9fafb; font-weight: 600; }
    .md-content em { color: #9ca3af; font-style: italic; }
    .md-content hr { border: none; border-top: 1px solid #374151; margin: 1.75rem 0; }
    .md-content table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.875rem; }
    .md-content th { background: #1f2937; color: #9ca3af; padding: 0.5rem 0.75rem; text-align: left; border: 1px solid #374151; }
    .md-content td { padding: 0.5rem 0.75rem; border: 1px solid #374151; }
    .md-content tr:nth-child(even) td { background: #111827; }
    .md-content blockquote { border-left: 3px solid #4b5563; padding-left: 1rem; color: #9ca3af; margin: 1rem 0; font-style: italic; }
    .md-content code { background: #1f2937; color: #f87171; padding: 0.1rem 0.35rem; border-radius: 4px; font-size: 0.85em; }
  </style>
</head>

)","Document parsing, chunking strategies","Retrieval-Augmented Generation (RAG) pipeline","Semantic search vs keyword search","RAG evaluation (relevance, faithfulness, correctness)"],resources:[{label:"DeepLearning.AI – LangChain: Chat with Your Data (free)",url:"https://www.deeplearning.ai/short-courses/langchain-chat-with-your-data/",time:"1.5 hrs"},{label:"DeepLearning.AI – Building & Evaluating Advanced RAG (free)",url:"https://www.deeplearning.ai/short-courses/building-evaluating-advanced-rag/",time:"1.5 hrs"},{label:"DeepLearning.AI – Knowledge Graphs for RAG (free)",url:"https://www.deeplearning.ai/short-courses/knowledge-graphs-rag/",time:"1.5 hrs"},{label:"LlamaIndex Docs & Tutorials (free)",url:"https://docs.llamaindex.ai",time:"reference"},{label:"Maxime Labonne – LLM Course (GitHub, free, 44K⭐)",url:"https://github.com/mlabonne/llm-course",time:"self-paced"},{label:"RAGAS – RAG Evaluation Framework (free)",url:"https://github.com/explodinggradients/ragas",time:"reference"},{label:"Weaviate Academy – Vector DB Course (free)",url:"https://weaviate.io/learn/academy",time:"self-paced"},{label:"Hugging Face NLP Course – Ch. 1–4 (free)",url:"https://huggingface.co/learn/nlp-course/chapter1/1",time:"self-paced"}],project:"Build a chatbot that answers questions from your own PDF documents or a knowledge base you care about.",milestone:"You can build a RAG pipeline from scratch and evaluate its quality."},{id:5,icon:Bot,title:"Phase 5 – Agentic AI",duration:"4–5 weeks",tag:"AI that thinks and acts",color:"from-orange-500 to-amber-600",tagColor:"bg-orange-100 text-orange-700",goal:"Build AI systems that don't just answer — they plan, use tools, and execute multi-step tasks autonomously.",topics:["Agents vs chatbots vs agentic systems","Tool calling and function calling","ReACT pattern: Reason → Act → Observe loop","Agentic workflows: prompt chaining, routing, parallelization, reflection","Memory: short-term (context), long-term (vector store), episodic","Multi-ag rom-blue-600 to-blue-800",border:"border-blue-700",title:"Core Prompting Techniques",desc:"These are non-negotiable. Master these before anything else. Most people stop here — experts start here.",techniques:[{name:"Zero-Shot Prompting",difficulty:"Beginner",use:"All use cases",what:"Ask directly with no examples. The baseline of everything.",bad:"Fix this code.",good:"You are a senior Python engineer. Review this function for bugs, performance issues, and readability. Output a list of issues with explanations and a corrected version.\n\n[paste code]",insight:"Adding a role, goal, and output format to a plain ask typically improves output quality by 40–60%. Most people never do this."},{name:"Few-Shot Prompting",difficulty:"Beginner",use:"Writing, classification, formatting",what:"Give the model 2–5 examples of input→output before your real request. Teaches format and tone without fine-tuning.",bad:"Write a commit message for this diff.",good:"Write a commit message for this diff. Follow this format:\n\nExample 1:\nDiff: Added null check to user login\nMessage: fix(auth): handle null user in login flow\n\nExample 2:\nDiff: Refactored payment module into separate service\nMessage: refactor(payments): extract payment logic to PaymentService\n\nNow write one for:\n[paste your diff]",insight:"Few-shot is the single most powerful technique for getting consistent output format — far easier than fine-tuning for most tasks."},{name:"Chain-of-Thought (CoT)",difficulty:"Beginner",use:"Reasoning, debugging, research, decisions",what:"Tell the model to think step by step before answering. Dramatically improves accuracy on complex tasks.",bad:"Which database should I use for this app?",good:"I'm building a real-time chat app expecting 100k concurrent users. Think step by step:\n1. Analyze the requirements (read/write patterns, latency needs, scale)\n2. Compare relevant database types\n3. Evaluate tradeoffs for my specific use case\n4. Give a final recommendation with reasoning",insight:"Adding 'think step by step' or breaking into numbered reasoning steps has been shown to improve LLM accuracy by 30–50% on complex tasks. Works even without examples."},{name:"Role / Persona Prompting",difficulty:"Beginner",use:"All use cases",what:"Assign the model an expert identity. Changes vocabulary, depth, assumptions, and communication style.",bad:"Review my resume.",good:"You are a senior engineering hiring manager at a top-tier tech company (FAANG level). You've reviewed 500+ resumes. Review this resume ruthlessly — identify what would get it rejected in under 10 seconds, what's missing, and what's weak. Be direct and specific.",insight:"The role you assign determines the frame of reference. 'Senior engineer' vs 'engineering manager' gives completely different feedback on the same resume."},{name:"Output Format Control",difficulty:"Beginner",use:"Coding, automation, structured data",what:"Explicitly specify the output format — JSON, markdown table, bullet points, specific length, etc.",bad:"Extract the key points from this article.",good:'Extract key points from this article. Return ONLY a JSON array with this structure:\n[\n  {\n    "point": "...",\n    "importance": "high|medium|low",\n    "category": "..."\n  }\n]\nNo preamble. No explanation. JSON only.',insight:"For app development, always specify JSON output + 'no preamble' to get parseable responses without extra parsing logic."}]},{id:2,tier:"Intermediate",icon:Settings,color:"from-purple-600 to-purple-800",border:"border-purple-700",title:"Power Techniques",desc:"Where good prompt engineers separate from great ones. These unlock reliability, depth, and consistency.",techniques:[{name:"System Prompt Design",difficulty:"Intermediate",use:"Apps, automation, consistent assistants",what:"The system prompt defines persistent identity, constraints, tone, and behavior. It's the most leveraged prompt you'll write.",bad:"You are a helpful assistant.",good:"## Identity\nYou are CodeReviewer, a senior ul than positive instructions. They eliminate the model's default bad habits directly."},{name:"Self-Consistency & Verification",difficulty:"Intermediate",use:"Research, critical decisions, debugging",what:"Ask the model to verify, critique, or challenge its own output in a follow-up prompt.",bad:"(accept first answer)",good:"First prompt: 'Explain why [X approach] is the best solution for [problem].'\n\nSecond prompt: 'Now steelman the opposing view. What are the strongest arguments AGAINST the approach you just recommended? What have you missed?'\n\nThird prompt: 'Given both perspectives, what is your updated final recommendation?'",insight:"LLMs are sycophantic by default — they agree with themselves. Forcing adversarial self-review surfaces blind spots that a single prompt never catches."},{name:"Contextual Priming",difficulty:"Intermediate",use:"Research, writing, code review",what:"Front-load rich context before your ask. The quality of context determines the quality of output more than prompt wording.",bad:"Write a technical spec for my feature.",good:"## Context\nApp: B2B SaaS project management tool\nUsers: Engineering teams at mid-sized companies\nStack: Next.js, PostgreSQL, REST API\nTeam: 3 engineers, 1 designer\nTimeline: 2-week sprint\n\n## Feature\nReal-time notifications when task status changes\n\n## Audience for this spec\nJunior engineers who will implement it\n\nWrite a technical specification covering: overview, user stories, API design, database schema changes, edge cases, and acceptance criteria.",insight:"The GIGO principle (garbage in, garbage out) applies more to context than prompt wording. Rich context → dramatically better output."}]},{id:3,tier:"Advanced",icon:FlaskConical,color:"from-orange-600 to-red-700",border:"border-orange-700",title:"Expert Techniques",desc:"What separates prompt engineers who build reliable systems from those who get lucky sometimes.",techniques:[{name:"Tree of Thoughts (ToT)",difficulty:"Advanced",use:"Complex om-blue-600 to-cyan-700",tips:[{title:"The Debug Template",prompt:"You are a senior [language] engineer debugging a production issue.\n\nCode:\n```\n[paste code]\n```\n\nError:\n```\n[paste error]\n```\n\nContext: [what you expected vs what happened]\n\nThink step by step:\n1. What is this code trying to do?\n2. What does the error indicate?\n3. What are the 3 most likely root causes?\n4. What is the fix for each?\n5. Which fix do you recommend and why?"},{title:"Code Review Template",prompt:"Review this [language] code as a senior engineer. Grade each dimension 1–5 and explain:\n- Correctness: Does it do what it intends?\n- Performance: Any O(n²) issues or unnecessary operations?\n- Security: Any vulnerabilities?\n- Readability: Is it self-documenting?\n- Edge cases: What inputs would break this?\n\nThen provide a corrected version with comments explaining each change.\n\n```\n[paste code]\n```"},{title:"Architecture Advisor",prompt:"I'm building [describe system]. Current scale: [users/requests]. Expected growth: [timeline].\n\nI'm considering [approach A] vs [approach B].\n\nEvaluate both approaches against:\n1. Scalability to [target scale]\n2. Developer complexity\n3. Operational overhead\n4. Cost at scale\n5. Migration difficulty from current state\n\nRecommend one and justify your choice."}]},{id:"writing",icon:PenLine,title:"Writing & Content",color:"from-purple-600 to-violet-700",tips:[{title:"Tone Calibration",prompt:"Rewrite the following in my voice. My writing style:\n- Direct and confident, never hedging\n- Short sentences. No fluff.\n- Technical but accessible\n- I use dry humor occasionally\n- I never use: 'leverage', 'synergy', 'delve', 'it's worth noting'\n\nOriginal:\n[paste text]\n\nRewrite it maintaining my style. Don't change the meaning."},{title:"Content Reviewer",prompt:"Review this [blog post/email/doc] as a critical editor.\n\nEvaluate:\n1. Opening — does it hook immediately or does it warm up too slowly?\n2. Clarity — any sentences that r ent answers each time."}],keyConceptsTitle:"Key Concepts to Master",keyConcepts:[{name:"Context Window",desc:"How many tokens the model can 'see' at once. GPT-4: 128k. Claude: 200k. Determines memory, document size, conversation length."},{name:"Temperature",desc:"0 = deterministic/focused. 1 = creative/varied. 2 = chaotic. For code: use 0–0.3. For creative writing: 0.7–1.0."},{name:"RLHF",desc:"Reinforcement Learning from Human Feedback. How models learn to be helpful and safe — humans rate outputs, a reward model is trained, then used to guide the LLM."},{name:"Hallucination",desc:"Models generate plausible-sounding but false information. Caused by probability-based generation, not factual lookup. Solution: RAG, grounding, verification."},{name:"Emergent Abilities",desc:"At scale, models suddenly gain capabilities not present in smaller versions — reasoning, code, translation. These aren't designed, they emerge from scale."},{name:"System Prompt",desc:"Instructions that persist throughout a conversation, defining identity, constraints, and behavior. The most powerful lever for consistent AI behavior."}],models:[{name:"GPT-4o",maker:"OpenAI",best:"General purpose, vision, tool use",access:"API + ChatGPT"},{name:"Claude 3.5 Sonnet",maker:"Anthropic",best:"Long context, analysis, coding, safety",access:"API + Claude.ai"},{name:"Gemini 1.5 Pro",maker:"Google",best:"Multimodal, very long context (1M tokens)",access:"API + Gemini"},{name:"Llama 3 70B",maker:"Meta (open)",best:"Open source, local/private use",access:"Ollama / HuggingFace"},{name:"Mistral Large",maker:"Mistral (open)",best:"Efficient, multilingual, open weights",access:"API / local"},{name:"DeepSeek R1",maker:"DeepSeek (open)",best:"Reasoning, math, coding, open source",access:"API / local"}],resources:[{label:"Andrej Karpathy – Intro to LLMs",url:"https://www.youtube.com/watch?v=zjkBMFhNj_g",free:!0,time:"1 hr"},{label:"3Blue1Brown – Transformers explained visually",url:"https://www.youtube.com/watch?v=wjZofJX0v4M",free:!0,time:"30 min"},{label:"Hands-On LLMs – Jay Alammar (O'Reilly)",url:"https://www.oreilly.com/library/view/hands-on-large-language/9781098150952/",free:!1,time:"Book"},{label:"The Illustrated Transformer – Jay Alammar",url:"https://jalammar.github.io/illustrated-transformer/",free:!0,time:"30 min"}]},code:{icon:Code2,title:"Code Generation",color:"from-green-600 to-teal-700",border:"border-green-700",tagline:"The most immediately useful GenAI for software developers. Already transforming how code is written.",howItWorks:[{step:"1. Code Pre-training",desc:"Models trained on massive code corpora (GitHub, Stack Overflow, docs). They learn syntax, patterns, and the relationships between natural language descriptions and code."},{step:"2. Fill-in-the-Middle (FIM)",desc:"Code models are trained not just to predict next tokens but to fill in missing sections given prefix AND suffix. This powers inline autocomplete in editors."},{step:"3. Instruction Fine-tuning",desc:"On top of raw code training, models are fine-tuned on (instruction → code) pairs. This is what makes them follow 'write a function that...' style prompts."},{step:"4. Context Awareness",desc:"Modern code models ingest open files, imports, function signatures, and even documentation to generate contextually relevant code — not just isolated snippets."},{step:"5. Tool Use / Agentic Coding",desc:"The frontier: AI agents that can run code, read error messages, search docs, edit files, and iterate autonomously. Claude Code, Cursor, and Devin operate this way."}],keyConceptsTitle:"Key Capabilities",keyConcepts:[{name:"Autocomplete",desc:"Line/block completion as you type. Copilot, Cursor. Low latency, context-aware."},{name:"Code Generation",desc:"Generate entire functions, classes, or files from a natural language description."},{name:"Refactoring",desc:"Transform existing code — extract functions, rename, optimize, change patterns — while preserving behavior."},{name:"Debugging",desc:"Given code + error, identify root cause and suggest fixes. Most models are excellent at this."},{name:"Test Generation",desc:"Generate unit tests, edge cases, and integration tests from source code."},{name:"Code Review",desc:"Review PRs or functions for bugs, security issues, performance, and style."}],models:[{name:"Claude 3.5 Sonnet",maker:"Anthropic",best:"Best overall for complex coding + reasoning",access:"API / Claude.ai / Claude Code"},{name:"GPT-4o",maker:"OpenAI",best:"Strong all-around, great with tool use",access:"API / ChatGPT / Copilot"},{name:"DeepSeek Coder V2",maker:"DeepSeek (open)",best:"Best open-source coding model",access:"Local / API"},{name:"Codestral",maker:"Mistral (open)",best:"Fast, efficient, 80+ languages",access:"API / local"},{name:"Gemini 1.5 Pro",maker:"Google",best:"Great for full codebase context (1M tokens)",access:"API / Gemini"}],tools:[{name:"Cursor",desc:"Best AI code editor. Claude/GPT-4 built in. Codebase-aware.",url:"https://cursor.sh"},{name:"GitHub Copilot",desc:"Industry standard autocomplete. Works in VS Code.",url:"https://github.com/features/copilot"},{name:"Claude Code",desc:"Anthropic's agentic CLI — reads/writes files, runs code.",url:"https://claude.ai/code"},{name:"Cody (Sourcegraph)",desc:"Codebase-aware AI across large repos.",url:"https://sourcegraph.com/cody"}],resources:[{label:"DeepLearning.AI – Pair Programming with LLMs",url:"https://www.deeplearning.ai/short-courses/pair-programming-llm/",free:!0,time:"1 hr"},{label:"Cursor Docs – Getting started",url:"https://docs.cursor.com",free:!0,time:"reference"},{label:"Claude Code documentation",url:"https://docs.anthropic.com/en/docs/claude-code/overview",free:!0,time:"reference"}]},image:{icon:Palette,title:"Image & Video Generation",color:"from-purple-600 to-pink-700",border:"border-purple-700",tagline:"From pixels to meaning — how AI learned to paint, and now to direct films.",howItWorks:[{step:"1. VAE – Compress to Latent Space",desc:"A Variational Autoencoder compresses images into a compact latent representation (much smaller than raw pixels). Generation happens in this compressed space — far more efficient."},{step:"2. Diffusion – Forward Process",desc:"Training: Take a real image, progressively add random Gaussian noise over many steps until it's pure noise. The model learns to reverse this — to denoise."},{step:"3. Diffusion – Reverse Process (Generation)",desc:"At generation time: Start from pure random noise. Iteratively apply the learned denoising steps. After ~20–50 steps, a coherent image emerges from nothing."},{step:"4. CLIP Text Conditioning",desc:"Text prompts are encoded into the same vector space as images (via CLIP). During denoising, the model is guided toward images that match the text embedding — this is how text-to-image works."},{step:"5. U-Net / DiT Architecture",desc:"The denoising network is either a U-Net (older, Stable Diffusion 1.x) or a Diffusion Transformer/DiT (newer — DALL-E 3, Flux, SD3). DiT architectures scale better and produce higher quality."},{step:"6. Video: Temporal Consistency",desc:"Video generation adds a time dimension — frames must be consistent across time. Models like Sora use 3D attention over space and time. The main challenge: motion coherence and physics."}],keyConceptsTitle:"Key Concepts",keyConcepts:[{name:"CFG Scale",desc:"Classifier-Free Guidance. How strictly the image follows the prompt. Low (1–5): artistic freedom. High (10–15): literal prompt following. Sweet spot: 7–9."},{name:"Sampling Steps",desc:"More steps = higher quality but slower. 20–30 steps usually sufficient. Diminishing returns beyond 50."},{name:"LoRA for Images",desc:"Train a small adapter on a person's face or art style. Inject into diffusion model to generate images of that specific person/style. Powers most face/style customization."},{name:"ControlNet",desc:"Control generation with structural guides — pose, depth map, edge detection. Lets you generate images that follow a specific composition."},{name:"Inpainting",desc:"Edit specific regions of an image while preserving the rest. Mask an area, describe what should replace it."},{name:"Prompt Weighting",desc:"(word:1.5) increases emphasis. (word:0.5) decreases it. Lets you control how much each element influences the output."}],models:[{name:"DALL-E 3",maker:"OpenAI",best:"Best prompt following, high quality, safe",access:"ChatGPT / API"},{name:"Midjourney v6",maker:"Midjourney",best:"Best aesthetic quality, photorealism",access:"Discord / Web"},{name:"Flux 1.1 Pro",maker:"Black Forest Labs (open)",best:"Best open model, excellent realism",access:"fal.ai / local"},{name:"Stable Diffusion 3.5",maker:"Stability AI (open)",best:"Open, customizable, LoRA/ControlNet",access:"Local / ComfyUI"},{name:"Ideogram 2.0",maker:"Ideogram",best:"Best at text in images",access:"ideogram.ai"},{name:"Sora / Kling / Runway",maker:"OpenAI / Kuaishou / Runway",best:"Text-to-video generation",access:"Web apps"}],resources:[{label:"HuggingFace – Diffusion Models Course (free)",url:"https://huggingface.co/learn/diffusion-course/unit0/1",free:!0,time:"self-paced"},{label:"DeepLearning.AI – How Diffusion Models Work",url:"https://www.deeplearning.ai/short-courses/how-diffusion-models-work/",free:!0,time:"1.5 hrs"},{label:"Computerphile – How Stable Diffusion Works",url:"https://www.youtube.com/watch?v=1CIpzeNxIhU",free:!0,time:"20 min"}]},audio:{icon:Music,title:"Audio & Music Generation",color:"from-orange-600 to-red-700",border:"border-orange-700",tagline:"The most rapidly evolving GenAI domain — voice cloning, music generation, and real-time speech are all here now.",howItWorks:[{step:"1. Audio as Spectrogram",desc:"Audio is represented as a spectrogram — a 2D image of frequency vs time. Many audio models are essentially image diffusion models operating on spectrograms."},{step:"2. Codec Models (EnCodec)",desc:"Modern TTS and music models compress audio into discrete tokens (like text tokens) using neural codecs. This allows transformer architectures to be applied directly to audio."},{step:"3. Text-to-Speech (TTS)",desc:"Text → phonemes → acoustic features → waveform. Modern TTS (ElevenLabs, Bark) adds emotional context, speaker identity, and prosody control via transformer models."},{step:"4. Voice Cloning",desc:"A reference audio clip (3–30 seconds) is encoded into a speaker embedding. This embedding conditions the TTS model to match that voice's characteristics."},{step:"5. Music Generation",desc:"Models like MusicGen and Suno treat music as long audio sequences. Trained on vast music corpora, they learn the structure of rhythm, melody, harmony, and genre."},{step:"6. Real-Time Voice AI",desc:"The frontier: full-duplex voice conversation with <300ms latency. GPT-4o Voice and Hume AI use end-to-end audio models — no intermediate text step, preserving tone and emotion."}],keyConceptsTitle:"Key Capabilities",keyConcepts:[{name:"Text-to-Speech (TTS)",desc:"Natural-sounding voice from text. Now indistinguishable from human in many cases. Used for content, accessibility, automation."},{name:"Voice Cloning",desc:"Clone any voice from a short sample. Ethical use: your own voice for content creation. Major deepfake risk."},{name:"Speech-to-Text (STT)",desc:"Transcription. Whisper (OpenAI) is state of the art, runs locally, handles accents well."},{name:"Music Generation",desc:"Generate full songs from text descriptions. Suno can generate 2-min songs with vocals, instruments, lyrics from a simple prompt."},{name:"Audio Enhancement",desc:"Remove background noise, enhance clarity, separate vocals from instruments. Adobe Enhance Speech, Lalal.ai."},{name:"Voice Agents",desc:"Real-time conversational AI with voice I/O. Vapi, Bland AI, Retell AI enable phone/voice automation."}],models:[{name:"ElevenLabs",maker:"ElevenLabs",best:"Best TTS quality + voice cloning",access:"API / Web"},{name:"Whisper v3",maker:"OpenAI (open)",best:"Best open-source STT, runs locally",access:"Local / API"},{name:"Suno v4",maker:"Suno",best:"Best full song generation with lyrics",access:"suno.com"},{name:"Udio",maker:"Udio",best:"High quality music, genre control",access:"udio.com"},{name:"MusicGen",maker:"Meta (open)",best:"Open source music generation",access:"HuggingFace / local"},{name:"Bark",maker:"Suno (open)",best:"Open TTS with emotions, laughter, sounds",access:"HuggingFace / local"}],resources:[{label:"Whisper by OpenAI – GitHub",url:"https://github.com/openai/whisper",free:!0,time:"setup"},{label:"ElevenLabs Docs – Voice cloning guide",url:"https://elevenlabs.io/docs",free:!0,time:"reference"},{label:"AudioCraft by Meta (MusicGen)",url:"https://github.com/facebookresearch/audiocraft",free:!0,time:"hands-on"}]}},allTools=[{category:"Text & Chat",icon:MessageSquare,tools:[{name:"Claude.ai",maker:"Anthropic",free:"Free tier",best:"Long docs, analysis, coding, nuanced writing",url:"https://claude.ai"},{name:"ChatGPT",maker:"OpenAI",free:"Free tier",best:"General use, image gen (DALL-E), browsing",url:"https://chat.openai.com"},{name:"Gemini Advanced",maker:"Google",free:"Free tier",best:"Google Workspace integration, 1M context",url:"https://gemini.google.com"},{name:"Perplexity",maker:"Perplexity AI",free:"Free tier",best:"Research with citations, web search",url:"https://perplexity.ai"}]},{category:"Code",icon:Code2,tools:[{name:"Cursor",maker:"Cursor",free:"Free tier",best:"Best AI code editor, codebase-aware",url:"https://cursor.sh"},{name:"GitHub Copilot",maker:"GitHub",free:"$10/mo",best:"Inline autocomplete, VS Code native",url:"https://github.com/features/copilot"},{name:"Claude Code",maker:"Anthropic",free:"Usage-based",best:"Agentic coding CLI, file operations",url:"https://claude.ai/code"},{name:"Replit AI",maker:"Replit",free:"Free tier",best:"Browser-based, deploy instantly",url:"https://replit.com"}]},{category:"Image Generation",icon:Palette,tools:[{name:"Midjourney",maker:"Midjourney",free:"Paid ($10/mo)",best:"Best aesthetic quality, photorealism",url:"https://midjourney.com"},{name:"DALL-E 3",maker:"OpenAI",free:"In ChatGPT free",best:"Best prompt adherence, safe",url:"https://openai.com/dall-e-3"},{name:"Adobe Firefly",maker:"Adobe",free:"Free credits",best:"Commercial safe, Photoshop integrated",url:"https://firefly.adobe.com"},{name:"Flux (fal.ai)",maker:"Black Forest Labs",free:"Pay-per-use",best:"Best open model, API accessible",url:"https://fal.ai"},{name:"ComfyUI",maker:"Open source",free:"Free (local)",best:"Maximum control, local, LoRA/ControlNet",url:"https://github.com/comfyanonymous/ComfyUI"},{name:"Ideogram",maker:"Ideogram",free:"Free tier",best:"Text in images, posters, logos",url:"https://ideogram.ai"}]},{category:"Video Generation",icon:Video,tools:[{name:"Runway Gen-3",maker:"Runway",free:"Free credits",best:"Best quality, professional use",url:"https://runwayml.com"},{name:"Kling AI",maker:"Kuaishou",free:"Free tier",best:"Realistic motion, free generous tier",url:"https://klingai.com"},{name:"Sora",maker:"OpenAI",free:"In ChatGPT Plus",best:"Longest clips, good physics",url:"https://sora.com"},{name:"Pika Labs",maker:"Pika",free:"Free tier",best:"Animate images, easy to use",url:"https://pika.art"}]},{category:"Audio & Voice",icon:Music,tools:[{name:"ElevenLabs",maker:"ElevenLabs",free:"Free tier",best:"Best TTS + voice cloning",url:"https://elevenlabs.io"},{name:"Suno",maker:"Suno",free:"Free tier",best:"Full song generation with lyrics",url:"https://suno.com"},{name:"Whisper",maker:"OpenAI",free:"Free (local)",best:"Best open-source transcription",url:"https://github.com/openai/whisper"},{name:"Udio",maker:"Udio",free:"Free tier",best:"High quality music, genre control",url:"https://udio.com"}]},{category:"Productivity & Workflow",icon:Zap,tools:[{name:"NotebookLM",maker:"Google",free:"Free",best:"Chat with documents, podcast generation",url:"https://notebooklm.google.com"},{name:"Notion AI",maker:"Notion",free:"Add-on",best:"AI inside your notes/docs/wiki",url:"https://notion.so/product/ai"},{name:"v0 ector database does and have used at least one (Chroma, Pinecone, etc.)","You can evaluate a RAG system — know what context relevance and faithfulness mean","You understand when RAG is better than fine-tuning and vice versa"],redFlags:["You haven't built a RAG pipeline — only read about it","You can't explain why naive RAG fails on long documents","Vector databases still feel like magic boxes"],stuckSignal:"RAG is one of the hardest phases to get unstuck from because it requires real data. If stuck, build a RAG over a Wikipedia article — not your own data — to remove friction.",skipRule:"No skip recommended. RAG is foundational for Phases 5 and 6."},{id:5,icon:Bot,title:"Phase 5 – Agentic AI",color:"from-orange-600 to-amber-700",border:"border-orange-700",duration:"4–5 weeks",nextPhase:"Phase 6 – Fine-Tuning",readinessThreshold:70,greenFlags:["You've built a working agent that uses at least 2 tools (e.g. search + summarize)","You understand the ReACT loop: Reason → Act → Observe → repeat","You know the difference between a workflow and an agent","You've debugged an agent that got stuck in a loop or took the wrong action","You understand at least 3 agentic design patterns (routing, reflection, orchestrator-worker)","You've used LangGraph or a similar framework for multi-step agent logic"],redFlags:["Your 'agent' is just prompt chaining without real tool use","You haven't handled agent failure modes (infinite loops, wrong tool calls)","MCP, A2A, and agentic frameworks still feel theoretical"],stuckSignal:"Agents are complex. If stuck, reduce scope: build the simplest possible agent (1 tool, 1 goal) and get it working reliably before adding complexity.",skipRule:"No skip recommended. Agent patterns appear in nearly every advanced AI system."},{id:6,icon:Building2,title:"Phase 6 – Fine-Tuning & Training",color:"from-rose-600 to-pink-700",border:"border-rose-700",duration:"6–8 weeks",nextPhase:"Phase 7 – Ship & Specialize",readinessThreshold:65,greenFlags:["You understan .",mathTopics:[{topic:"Linear Algebra",need:"Vectors, matrices, dot products, matrix multiply. That's it.",depth:"Conceptual"},{topic:"Calculus",need:"What a derivative is. Chain rule intuitively. No need to compute by hand.",depth:"Conceptual"},{topic:"Probability",need:"Softmax, probability distributions, cross-entropy loss. Why we maximize log-likelihood.",depth:"Light"}],exploreTopics:[{name:"Attention mechanism math",why:"The core operation. Q, K, V matrices. Scaled dot-product. You can read the Attention paper now.",resource:"The Illustrated Transformer – Jay Alammar",url:"https://jalammar.github.io/illustrated-transformer/"},{name:"Scaling laws",why:"Why bigger models are smarter. Chinchilla laws. Compute-optimal training. Explains the entire LLM arms race.",resource:"Chinchilla paper (skim)",url:"https://arxiv.org/abs/2203.15556"},{name:"KV Cache",why:"How inference is made fast. Explains context window limits and latency.",resource:"Karpathy's LLM internals talk",url:"https://www.youtube.com/watch?v=zjkBMFhNj_g"},{name:"MoE (Mixture of Experts)",why:"How GPT-4, Mixtral, and DeepSeek scale without proportional compute cost.",resource:"Hugging Face MoE blog",url:"https://huggingface.co/blog/moe"},{name:"Positional encodings (RoPE, ALiBi)",why:"How models understand word order and handle long contexts.",resource:"EleutherAI blog",url:"https://blog.eleuther.ai/rotary-embeddings/"}]},{id:"prompt",icon:Zap,title:"Prompt Engineering",current:90,target:95,color:"from-green-600 to-teal-700",border:"border-green-800",gap:"Near expert. The 5% gap is systematic evaluation of prompts and knowledge of model-specific quirks (Claude vs GPT-4 vs Gemini behave differently at edge cases).",mathNeeded:"none",mathDetail:"Zero math needed. Prompt engineering is pure empirical experimentation and pattern recognition.",mathTopics:[],exploreTopics:[{name:"Prompt evaluation frameworks",why:"Treat prompts like code — version, test, measure. Most people never do this.",resource:"PromptFoo docs",url:"https://promptfoo.dev/docs/intro"},{name:"Model-specific quirks",why:"Claude responds differently to authority framing vs GPT-4. Gemini handles long docs differently. Knowing these edges saves hours.",resource:"Anthropic model card",url:"https://www.anthropic.com/claude"},{name:"DSPy – Programmatic prompting",why:"Next evolution: optimizing prompts automatically using algorithms instead of manual tuning.",resource:"DSPy GitHub",url:"https://github.com/stanfordnlp/dspy"}]},{id:"rag",icon:BookOpen,title:"RAG Systems",current:80,target:90,color:"from-purple-600 to-violet-700",border:"border-purple-800",gap:"You can build RAG. The gap is advanced retrieval techniques, hybrid search, and production-grade evaluation.",mathNeeded:"light",mathDetail:"Cosine similarity (dot product of normalized vectors) is the core math behind semantic search. You need to understand it conceptually — why similar vectors have high cosine similarity — not derive it.",mathTopics:[{topic:"Cosine Similarity",need:"Why it measures semantic closeness. Intuition: angle between vectors.",depth:"Conceptual"},{topic:"Vector spaces",need:"Why embeddings cluster semantically similar content.",depth:"Conceptual"},{topic:"BM25 (sparse retrieval)",need:"How keyword search works as complement to semantic search.",depth:"Light"}],exploreTopics:[{name:"Hybrid search (sparse + dense)",why:"BM25 + vector search together beats either alone. Production RAG almost always uses hybrid.",resource:"Weaviate hybrid search docs",url:"https://weaviate.io/blog/hybrid-search-explained"},{name:"HyDE (Hypothetical Document Embeddings)",why:"Generate a hypothetical answer, embed it, then search. Dramatically improves retrieval quality.",resource:"HyDE paper",url:"https://arxiv.org/abs/2212.10496"},{name:"GraphRAG",why:"Microsoft's technique — build a knowledge graph from documents for multi-hop reasoning. Outperforms naive RAG on complex questions.",resource:"Microsoft GraphRAG",url:"https://microsoft.github.io/graphrag/"},{name:"RAGAS evaluation",why:"Systematic RAG evaluation. Context relevance, faithfulness, answer correctness. Essential for production.",resource:"RAGAS docs",url:"https://docs.ragas.io"},{name:"Reranking",why:"Two-stage retrieval: broad semantic search → reranker (Cohere, cross-encoder) picks best results. Huge quality boost.",resource:"Cohere reranking guide",url:"https://docs.cohere.com/docs/reranking"}]},{id:"agents",icon:Bot,title:"Agentic AI / Tool Use",current:75,target:88,color:"from-orange-600 to-amber-700",border:"border-orange-800",gap:"You understand patterns. The gap is reliability engineering for agents — making them robust, observable, and recoverable when they fail.",mathNeeded:"none",mathDetail:"No math needed for agentic AI. It's software architecture, prompt design, and systems thinking.",mathTopics:[],exploreTopics:[{name:"Agent failure modes & recovery",why:"Infinite loops, wrong tool calls, hallucinated tool inputs. How to detect and recover gracefully.",resource:"Anthropic agent guide",url:"https://docs.anthropic.com/en/docs/agents-and-tools/tool-use/overview"},{name:"Long-horizon task planning",why:"Agents that need 10+ steps to complete a task. How to maintain coherence over long runs.",resource:"LangGraph docs",url:"https://langchain-ai.github.io/langgraph/"},{name:"Agent memory systems",why:"Short-term (context), long-term (vector store), episodic (past runs), semantic (facts). Knowing which to use when.",resource:"MemGPT paper",url:"https://arxiv.org/abs/2310.08560"},{name:"MCP deep dive",why:"Model Context Protocol is becoming the USB-C of AI tool integration. Already supported by Claude, Cursor, and dozens of services.",resource:"MCP docs",url:"https://docs.anthropic.com/en/docs/agents-and-tools/mcp"},{name:"Agent observability",why:"Tracing every LLM call, tool invocation, and decision in a multi-step agent. Essential for debugging.",resource:"LangSmith tracing",url:"https://docs.smith.langchain.com"}]},{id:"finetune",icon:Building2,title:"Fine-Tuning / Training",current:60,target:80,color:"from-rose-600 to-pink-700",border:"border-rose-800",gap:"This is your biggest gap between where you are and where a solid AI engineer should be. The gap is hands-on training experience and understanding the math behind optimization.",mathNeeded:"medium",mathDetail:"This is where math actually matters. You need enough to interpret training runs, understand why your model is overfitting, and make informed hyperparameter decisions. You don't need PhD-level proofs — you need applied intuition.",mathTopics:[{topic:"Calculus — Gradients & Loss",need:"What a loss curve means. Why high loss = bad. What overfitting looks like on a val loss graph.",depth:"Applied"},{topic:"Linear Algebra — Matrix ops",need:"LoRA adds low-rank matrices to weight matrices. You need to understand rank and why low-rank approximations work.",depth:"Applied"},{topic:"Statistics — Distributions",need:"Cross-entropy loss, KL divergence (used in RLHF), perplexity. Not derivations — intuitions.",depth:"Applied"},{topic:"Optimization",need:"Adam optimizer, learning rate schedules, warmup. Why these choices matter practically.",depth:"Applied"}],exploreTopics:[{name:"LoRA mechanics (the math)",why:"Understand WHY low-rank adaptation works. W = W₀ + AB where rank(AB) << rank(W). This intuition helps you tune rank and alpha.",resource:"LoRA paper (original)",url:"https://arxiv.org/abs/2106.09685"},{name:"DPO (Direct Preference Optimization)",why:"The modern RLHF replacement. Simpler than PPO, no reward model needed. Most new models use DPO now.",resource:"DPO paper",url:"https://arxiv.org/abs/2305.18290"},{name:"Unsloth fine-tuning notebooks",why:"Hands-on: fine-tune Llama 3 on Colab in 30 minutes. The fastest path from 60% to 75%.",resource:"Unsloth GitHub",url:"https://github.com/unslothai/unsloth"},{name:"Hyperparameter intuition",why:"Learning rate, batch size, warmup steps, LoRA rank — knowing what each does to training dynamics.",resource:"Sebastian Raschka's blog",url:"https://sebastianraschka.com/blog/"},{name:"Evaluation during training",why:"Train/val loss curves, perplexity, MMLU benchmarks. How to know if your fine-tune is working.",resource:"Weights & Biases LLM tutorial",url:"https://docs.wandb.ai/tutorials/llm_finetuning"}]},{id:"multimodal",icon:Eye,title:"Multimodal AI",current:40,target:75,color:"from-violet-600 to-purple-700",border:"border-violet-800",gap:"Large gap. You understand diffusion conceptually but haven't built multimodal apps. This is the most immediately useful area to improve given Claude and GPT-4V are already in your hands.",mathNeeded:"light",mathDetail:"For practical multimodal AI (building apps with vision), almost no math is needed. If you want to understand diffusion models deeply, you need probability theory and some calculus.",mathTopics:[{topic:"Probability — Gaussian distributions",need:"Diffusion adds/removes Gaussian noise. Understanding normal distributions explains the forward/reverse process.",depth:"Conceptual"},{topic:"Linear Algebra — CLIP embeddings",need:"How text and images are projected into the same vector space. Same cosine similarity intuition as RAG.",depth:"Conceptual"}],exploreTopics:[{name:"Vision prompting techniques",why:"How to prompt Claude/GPT-4V effectively with images. Different from text prompting. Very high immediate ROI.",resource:"Anthropic vision docs",url:"https://docs.anthropic.com/en/docs/build-with-claude/vision"},{name:"Document understanding apps",why:"Extract structured data from PDFs, receipts, invoices, contracts using vision models. Immediately buildable.",resource:"Claude vision cookbook",url:"https://github.com/anthropics/anthropic-cookbook/tree/main/multimodal"},{name:"CLIP — how text and images share a space",why:"The foundational idea behind image generation, image search, and vision-language models.",resource:"OpenAI CLIP blog",url:"https://openai.com/research/clip"},{name:"Multimodal RAG",why:"Embed both text and images in the same vector store. Search across PDFs with charts, diagrams, and text together.",resource:"LlamaIndex multimodal RAG",url:"https://docs.llamaindex.ai/en/stable/examples/multi_modal/"},{name:"Video understanding",why:"Gemini 1.5 can process entire videos. New class of applications: video summarization, meeting analysis, video search.",resource:"Gemini video docs",url:"https://ai.google.dev/gemini-api/docs/vision"}]},{id:"math",icon:BookMarked,title:"ML Research / Math",current:30,target:60,color:"from-cyan-600 to-blue-700",border:"border-cyan-800",gap:"30% is actually fine for a developer with your goals. You don't need 90% here. A target of 55–60% — enough to read papers fluently and understand training dynamics — is realistic and sufficient.",mathNeeded:"structured",mathDetail:"Here's the honest breakdown: you need 4 specific math areas, each to a specific depth. NOT a full university course in each. Targeted, applied study of each concept as it relates to AI.",mathTopics:[{topic:"Linear Algebra",need:"Vectors, matrices, dot product, matrix multiply, eigenvalues (basic intuition). 3Blue1Brown Essence of Linear Algebra is all you need.",depth:"Applied — 10 hrs"},{topic:"Calculus",need:"Derivatives, chain rule, gradients, partial derivatives. Enough to understand backprop directionally. NOT integration, NOT limits proofs.",depth:"Applied — 6 hrs"},{topic:"Probability & Statistics",need:"Probability distributions, Bayes theorem, expectation, variance, KL divergence, cross-entropy. YES — this is the most important one for AI.",depth:"Applied — 12 hrs"},{topic:"Information Theory",need:"Entropy, cross-entropy loss, mutual information. Directly used in LLM training objectives.",depth:"Light — 4 hrs"}],exploreTopics:[{name:"3Blue1Brown – Essence of Linear Algebra",why:"The best visual introduction to linear algebra for AI. 15 videos, ~3hrs total. After this, attention mechanism math will click.",resource:"YouTube playlist (free)",url:"https://www.youtube.com/playlist?list=PLZHQObOWTQDPD3MizzM2xVFitgF8hE_ab"},{name:"3Blue1Brown – Essence of Calculus",why:"11 videos. Gradients, derivatives, chain rule — all you need for backpropagation intuition.",resource:"YouTube playlist (free)",url:"https://www.youtube.com/playlist?list=PLZHQObOWTQDMsr9K-rj53DwVRMYO3t5Yr"},{name:"StatQuest – Statistics & ML",why:"Josh Starmer makes probability and stats genuinely easy. Covers everything from Bayes to KL divergence with visuals.",resource:"YouTube channel (free)",url:"https://www.youtube.com/@statquest"},{name:"Mathematics for Machine Learning (book)",why:"Free PDF from Cambridge. Covers linear algebra, calculus, and probability specifically for ML. Reference, not cover-to-cover.",resource:"Free PDF (Cambridge)",url:"https://mml-book.github.io/"},{name:"Fast.ai – Practical Deep Learning",why:"Code-first approach to ML math. Learn the math by implementing it. Best for developers who hate pure theory.",resource:"fast.ai (free)",url:"https://course.fast.ai"}]},{id:"mlops",icon:Wrench,title:"Production / MLOps",current:50,target:75,color:"from-red-600 to-rose-700",border:"border-red-800",gap:"You know the concepts but lack hands-on deployment experience. The gap is practical: deploy something, break it, observe it, fix it.",mathNeeded:"none",mathDetail:"Zero math needed. MLOps is software engineering applied to AI — observability, reliability, cost optimization, and DevOps patterns.",mathTopics:[],exploreTopics:[{name:"LLM observability with LangSmith",why:"Trace every LLM call in your app. See latency, cost, inputs, outputs, errors. Transforms how you debug.",resource:"LangSmith quickstart",url:"https://docs.smith.langchain.com/tutorials/Developers/traceable"},{name:"Prompt versioning & regression testing",why:"When you change a prompt, how do you know it didn't break something else? Treat prompts like code.",resource:"PromptFoo CI/CD guide",url:"https://promptfoo.dev/docs/integrations/ci-cd/"},{name:"vLLM for inference",why:"Ser
